<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Chat Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --accent-radius: 35px;
        }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; 
            background-color: #F8F8F8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            position: fixed;
            left: 0; top: 0;
        }

        .app-shell {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            background-color: #F8F8F8;
        }

        /* 顶部导航圆角适配 */
        header {
            padding-top: var(--safe-top);
            height: calc(64px + var(--safe-top));
            background: white;
            border-bottom-left-radius: var(--accent-radius);
            border-bottom-right-radius: var(--accent-radius);
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-left: 24px;
            padding-right: 24px;
            z-index: 50;
            flex-shrink: 0;
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 20px 16px 40px 16px;
            margin-top: -10px; /* 稍微向上衔接圆角 */
        }

        /* 底部区域圆角适配 */
        footer {
            background: white;
            border-top-left-radius: var(--accent-radius);
            border-top-right-radius: var(--accent-radius);
            padding-bottom: var(--safe-bottom);
            box-shadow: 0 -4px 20px rgba(0,0,0,0.03);
            z-index: 50;
            flex-shrink: 0;
        }

        .msg-bubble { 
            max-width: 82%; 
            padding: 12px 18px; 
            border-radius: 1.4rem; 
            font-size: 16px; 
            line-height: 1.5; 
            word-wrap: break-word;
            position: relative;
        }
        .user-bubble { background: #000; color: #fff; border-top-right-radius: 4px; }
        .ai-bubble { background: #fff; color: #000; border-top-left-radius: 4px; border: 0.5px solid rgba(0,0,0,0.1); }

        .bubble-menu { 
            position: absolute; 
            top: -55px; 
            background: rgba(0, 0, 0, 0.9); 
            backdrop-filter: blur(10px);
            border-radius: 14px; 
            display: flex; 
            padding: 4px; 
            opacity: 0; 
            transform: scale(0.9); 
            transition: all 0.2s ease; 
            pointer-events: none; 
            z-index: 60; 
        }
        .bubble-menu.active { opacity: 1; transform: scale(1); pointer-events: auto; }
        .menu-item { color: white; padding: 6px 12px; font-size: 13px; font-weight: 500; }

        .page-overlay { 
            position: fixed; 
            top: 0; left: 0; right: 0; bottom: 0;
            background: #F8F8F8; 
            z-index: 100; 
            transform: translateY(100%); 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex; 
            flex-direction: column; 
            padding-top: var(--safe-top);
        }
        .page-overlay.active { transform: translateY(0); }

        .typing-dot { animation: typing 1.4s infinite ease-in-out both; width: 5px; height: 5px; background: #999; border-radius: 50%; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0.5); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }
        
        ::-webkit-scrollbar { display: none; }

        .api-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .api-card.active {
            border-color: #000;
            background: #fdfdfd;
        }
    </style>
</head>
<body>

    <div class="app-shell">
        <header>
            <div class="w-10"></div>
            <h1 id="display-name" class="text-[17px] font-bold text-gray-900">AI Assistant</h1>
            <button onclick="openPersonaPage()" class="w-10 h-10 flex items-center justify-end text-gray-400">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M5 12c0 1.1.9 2 2 2s2-.9 2-2-.9-2-2-2-2 .9-2 2zm7 0c0 1.1.9 2 2 2s2-.9 2-2-.9-2-2-2-2 .9-2 2zm7 0c0 1.1.9 2 2 2s2-.9 2-2-.9-2-2-2-2 .9-2 2z"/></svg>
            </button>
        </header>

        <main id="chat-box"></main>

        <footer>
            <div id="quote-preview-bar" class="hidden px-6 py-3 bg-gray-50 border-l-4 border-black text-[12px] text-gray-500 flex justify-between items-center">
                <span id="quote-preview-text" class="truncate italic mr-4"></span>
                <button onclick="cancelQuote()" class="text-gray-400">✕</button>
            </div>
            
            <div class="px-5 py-4 flex items-end gap-3">
                <div class="relative mb-1">
                    <div id="plus-menu" class="hidden absolute bottom-14 left-0 w-44 bg-white rounded-2xl shadow-2xl border border-gray-100 overflow-hidden z-[60]">
                        <button onclick="toggleSettings(); closeMenu();" class="w-full text-left px-5 py-4 active:bg-gray-50 text-[15px] font-medium border-b border-gray-50">API 预设 ⚙️</button>
                        <button onclick="clearChat(); closeMenu();" class="w-full text-left px-5 py-4 active:bg-gray-50 text-[15px] font-medium text-red-500">清空对话 🗑️</button>
                    </div>
                    <button onclick="toggleMenu()" class="text-gray-300 w-10 h-10 flex items-center justify-center">
                        <svg id="plus-icon" class="w-8 h-8 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path d="M12 6v12M6 12h12"/></svg>
                    </button>
                </div>
                <div class="flex-1 bg-gray-100 rounded-[1.8rem] px-5 flex items-center">
                    <textarea id="message-input" rows="1" class="w-full bg-transparent border-none outline-none resize-none py-3 text-[17px] max-h-32" placeholder="发个消息..." enterkeyhint="send"></textarea>
                </div>
            </div>
        </footer>

        <!-- 人设 & 世界书面板 -->
        <div id="persona-page" class="page-overlay">
            <header class="rounded-none">
                <button onclick="closePersonaPage()" class="text-[16px] text-gray-400">关闭</button>
                <h2 class="font-bold text-[17px]">角色设定</h2>
                <button onclick="savePersona()" class="text-[16px] font-bold text-black">保存</button>
            </header>
            <div class="flex-1 overflow-y-auto p-6 space-y-8 pb-10">
                <section>
                    <label class="text-[11px] font-bold text-gray-400 mb-2 block uppercase tracking-widest">昵称</label>
                    <input type="text" id="p-name" class="w-full border-b pb-1 outline-none text-xl font-bold bg-transparent">
                    <label class="text-[11px] font-bold text-gray-400 mt-6 mb-2 block uppercase tracking-widest">性格设定 (PROMPT)</label>
                    <textarea id="p-prompt" rows="4" class="w-full bg-white rounded-2xl p-4 text-[15px] outline-none shadow-sm" placeholder="TA是谁？"></textarea>
                </section>
                <section>
                    <div class="flex justify-between items-end mb-4">
                        <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest">世界书</label>
                        <button onclick="addWBItem()" class="text-[12px] font-bold text-blue-500">+ 添加</button>
                    </div>
                    <div id="wb-list" class="space-y-3"></div>
                </section>
            </div>
        </div>

        <!-- API 预设管理面板 (由 settings 改编) -->
        <div id="settings-modal" class="page-overlay">
            <header class="rounded-none">
                <button onclick="toggleSettings()" class="text-[16px] text-gray-400">取消</button>
                <h2 class="font-bold text-[17px]">API 管理</h2>
                <button onclick="addNewConfig()" class="text-[16px] font-bold text-blue-500">+ 新增</button>
            </header>
            <div class="flex-1 overflow-y-auto p-6 space-y-6">
                <div id="config-list" class="space-y-4">
                    <!-- 动态加载预设 -->
                </div>
                
                <div id="edit-area" class="hidden bg-white p-6 rounded-[2rem] shadow-sm space-y-4">
                    <h3 class="font-bold text-sm text-gray-400 uppercase">编辑选中预设</h3>
                    <input type="text" id="api-name" class="w-full border-b py-2 outline-none text-sm" placeholder="预设名称 (如: DeepSeek)">
                    <input type="text" id="api-url" class="w-full border-b py-2 outline-none text-sm" placeholder="Base URL">
                    <input type="password" id="api-key" class="w-full border-b py-2 outline-none text-sm" placeholder="API Key">
                    
                    <div class="flex gap-2 items-center">
                        <input type="text" id="api-model" class="flex-1 border-b py-2 outline-none text-sm" placeholder="模型名称">
                        <button onclick="fetchModels()" class="px-3 py-2 bg-black text-white text-[11px] font-bold rounded-lg shadow-md active:scale-95 transition-all">拉取列表</button>
                    </div>
                    <div id="model-select-container" class="hidden">
                        <select id="model-dropdown" class="w-full p-2 bg-gray-50 rounded-lg text-sm" onchange="document.getElementById('api-model').value = this.value"></select>
                    </div>
                    
                    <div class="flex gap-3 pt-2">
                        <button onclick="saveCurrentEdit()" class="flex-1 py-3 bg-black text-white rounded-xl font-bold">保存修改</button>
                        <button onclick="deleteCurrentConfig()" class="px-5 py-3 bg-red-50 text-red-500 rounded-xl font-bold text-sm">删除</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="toast" class="fixed top-24 left-1/2 -translate-x-1/2 bg-black/90 text-white px-6 py-3 rounded-full text-[12px] font-bold opacity-0 transition-all pointer-events-none z-[300] shadow-xl"></div>
    </div>

    <script>
        let configs = [{ id: '1', name: '默认预设', apiUrl: '', apiKey: '', model: '' }];
        let activeConfigId = '1';
        let persona = { name: 'AI Assistant', prompt: '你是一个真人好友。', worldBook: [] };
        let messages = [];
        let isWaiting = false;
        let quoting = null;

        window.onload = () => {
            const sc = localStorage.getItem('ai_configs'); if (sc) configs = JSON.parse(sc);
            const sa = localStorage.getItem('ai_active_id'); if (sa) activeConfigId = sa;
            const sp = localStorage.getItem('ai_psn'); if (sp) persona = JSON.parse(sp);
            const sh = localStorage.getItem('ai_his'); if (sh) { messages = JSON.parse(sh); renderHistory(); }
            
            document.getElementById('display-name').innerText = persona.name;
            document.getElementById('p-name').value = persona.name;
            document.getElementById('p-prompt').value = persona.prompt;
            renderWBList();
            renderConfigList();

            const input = document.getElementById('message-input');
            input.oninput = function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 128) + 'px'; };
            input.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };
        };

        // --- API 配置逻辑 ---
        function renderConfigList() {
            const list = document.getElementById('config-list');
            list.innerHTML = '';
            configs.forEach(cfg => {
                const isActive = cfg.id === activeConfigId;
                const div = document.createElement('div');
                div.className = `api-card ${isActive ? 'active' : ''}`;
                div.innerHTML = `
                    <div class="flex justify-between items-center" onclick="selectConfig('${cfg.id}')">
                        <div>
                            <div class="font-bold text-[16px]">${cfg.name || '未命名'}</div>
                            <div class="text-[11px] text-gray-400 mt-1">${cfg.model || '未设置模型'}</div>
                        </div>
                        ${isActive ? '<span class="text-xs bg-black text-white px-2 py-0.5 rounded-full">当前</span>' : ''}
                    </div>
                `;
                list.appendChild(div);
            });
            updateEditArea();
        }

        function selectConfig(id) {
            activeConfigId = id;
            localStorage.setItem('ai_active_id', id);
            renderConfigList();
            showToast(`已切换至: ${configs.find(c => c.id === id).name}`);
        }

        function updateEditArea() {
            const editArea = document.getElementById('edit-area');
            const cfg = configs.find(c => c.id === activeConfigId);
            if (!cfg) return editArea.classList.add('hidden');
            
            editArea.classList.remove('hidden');
            document.getElementById('api-name').value = cfg.name || '';
            document.getElementById('api-url').value = cfg.apiUrl || '';
            document.getElementById('api-key').value = cfg.apiKey || '';
            document.getElementById('api-model').value = cfg.model || '';
            document.getElementById('model-select-container').classList.add('hidden');
        }

        function addNewConfig() {
            const newId = Date.now().toString();
            configs.push({ id: newId, name: '新预设', apiUrl: '', apiKey: '', model: '' });
            activeConfigId = newId;
            renderConfigList();
        }

        function saveCurrentEdit() {
            const cfg = configs.find(c => c.id === activeConfigId);
            if (!cfg) return;
            cfg.name = document.getElementById('api-name').value;
            cfg.apiUrl = document.getElementById('api-url').value;
            cfg.apiKey = document.getElementById('api-key').value;
            cfg.model = document.getElementById('api-model').value;
            localStorage.setItem('ai_configs', JSON.stringify(configs));
            renderConfigList();
            showToast("预设已保存");
        }

        function deleteCurrentConfig() {
            if (configs.length <= 1) return showToast("至少保留一个预设");
            configs = configs.filter(c => c.id !== activeConfigId);
            activeConfigId = configs[0].id;
            localStorage.setItem('ai_configs', JSON.stringify(configs));
            renderConfigList();
        }

        async function fetchModels() {
            const baseUrl = document.getElementById('api-url').value;
            const apiKey = document.getElementById('api-key').value;
            if (!baseUrl || !apiKey) return showToast("请先填写 URL 和 Key");

            showToast("正在拉取模型列表...");
            try {
                const res = await fetch(`${baseUrl}/models`, {
                    headers: { 'Authorization': `Bearer ${apiKey}` }
                });
                const data = await res.json();
                if (data.data && Array.isArray(data.data)) {
                    const select = document.getElementById('model-dropdown');
                    select.innerHTML = '<option value="">请选择获取到的模型</option>';
                    data.data.forEach(m => {
                        const opt = document.createElement('option');
                        opt.value = m.id;
                        opt.innerText = m.id;
                        select.appendChild(opt);
                    });
                    document.getElementById('model-select-container').classList.remove('hidden');
                    showToast(`成功获取 ${data.data.length} 个模型`);
                } else {
                    throw new Error();
                }
            } catch (e) {
                showToast("拉取失败，请检查连接");
            }
        }

        // --- 聊天逻辑 ---
        async function requestAI() {
            if (isWaiting) return;
            const cfg = configs.find(c => c.id === activeConfigId);
            if (!cfg || !cfg.apiKey) return showToast("配置无效");

            isWaiting = true;
            const loader = createLoader();
            try {
                const lastContent = messages[messages.length-1].content;
                const wb = persona.worldBook.filter(i => i.key && lastContent.includes(i.key)).map(i => `${i.key}:${i.content}`).join('\n');
                const sys = `你是${persona.name}。${persona.prompt}\n${wb?'背景资料:'+wb:''}\n[禁止括号描写，禁止AI自称]`;
                
                const res = await fetch(`${cfg.apiUrl}/chat/completions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${cfg.apiKey}` },
                    body: JSON.stringify({
                        model: cfg.model,
                        messages: [{ role: 'system', content: sys }, ...messages.slice(-10).map(m=>({role:m.role,content:m.content}))],
                        temperature: 0.8
                    })
                });
                const data = await res.json();
                loader.remove();
                if (data.choices?.[0]?.message) {
                    const reply = data.choices[0].message.content;
                    const segments = reply.split(/\n/).filter(s => s.trim());
                    for (let s of segments) {
                        const content = cleanBrackets(s);
                        messages.push({ role: 'assistant', content });
                        displayMessage('assistant', content, messages.length - 1);
                        localStorage.setItem('ai_his', JSON.stringify(messages));
                        await new Promise(r => setTimeout(r, 1000));
                    }
                }
            } catch (e) { loader.remove(); showToast("请求失败"); } finally { isWaiting = false; }
        }

        // --- 基础 UI 交互 ---
        function handleSend() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text || isWaiting) return;

            let msg = { role: 'user', content: text };
            if (quoting) { msg.quote = quoting.content; cancelQuote(); }
            input.value = ''; input.style.height = 'auto';
            messages.push(msg);
            displayMessage('user', msg.content, messages.length - 1, msg.quote);
            localStorage.setItem('ai_his', JSON.stringify(messages));
            setTimeout(() => requestAI(), 500);
        }

        function displayMessage(role, content, idx, quote = null) {
            const isUser = role === 'user';
            const chatBox = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `w-full flex flex-col mb-5 ${isUser ? 'items-end' : 'items-start'}`;
            div.id = `msg-${idx}`;
            
            const qH = quote ? `<div class="px-2 mb-1 text-[11px] text-gray-400">“${cleanBrackets(quote)}”</div>` : '';
            div.innerHTML = `
                ${qH}
                <div class="relative flex ${isUser ? 'justify-end' : 'justify-start'} w-full">
                    <div class="bubble-menu ${isUser ? 'right-0' : 'left-0'}" id="menu-${idx}">
                        <div class="menu-item" onclick="quoteMsg(${idx})">引用</div>
                        <div class="menu-item text-red-400" onclick="deleteMsg(${idx})">删除</div>
                    </div>
                    <div id="bubble-${idx}" class="msg-bubble ${isUser ? 'user-bubble' : 'ai-bubble'}">${escapeHTML(content)}</div>
                </div>
            `;
            
            const b = div.querySelector(`#bubble-${idx}`);
            let sX = 0;
            b.ontouchstart = (e) => sX = e.touches[0].clientX;
            b.ontouchmove = (e) => {
                let d = e.touches[0].clientX - sX;
                if (d < -40) { hideAllMenus(); div.querySelector('.bubble-menu').classList.add('active'); b.style.transform = 'translateX(-20px)'; }
                if (d > 40) hideAllMenus();
            };

            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function createLoader() {
            const d = document.createElement('div'); d.className = 'w-full flex items-start mb-5';
            d.innerHTML = `<div class="ai-bubble px-5 py-3 flex gap-1.5"><div class="typing-dot"></div><div class="typing-dot" style="animation-delay:0.2s"></div><div class="typing-dot" style="animation-delay:0.4s"></div></div>`;
            document.getElementById('chat-box').appendChild(d);
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
            return d;
        }

        function renderWBList() {
            const l = document.getElementById('wb-list'); l.innerHTML = '';
            persona.worldBook.forEach((item, i) => {
                const d = document.createElement('div'); d.className = 'bg-white p-4 rounded-2xl shadow-sm';
                d.innerHTML = `<div class="flex gap-2 mb-2"><input type="text" class="flex-1 font-bold text-xs bg-transparent border-b" value="${item.key}" onchange="upWB(${i},'key',this.value)" placeholder="触发词"><button onclick="rmWB(${i})" class="text-red-300">✕</button></div><textarea class="w-full text-xs bg-transparent outline-none" rows="2" onchange="upWB(${i},'content',this.value)" placeholder="具体内容">${item.content}</textarea>`;
                l.appendChild(d);
            });
        }
        function upWB(i, f, v) { persona.worldBook[i][f] = v; }
        function rmWB(i) { persona.worldBook.splice(i, 1); renderWBList(); }
        function addWBItem() { persona.worldBook.push({key:'', content:''}); renderWBList(); }

        function hideAllMenus() { document.querySelectorAll('.bubble-menu').forEach(m => m.classList.remove('active')); document.querySelectorAll('.msg-bubble').forEach(b => b.style.transform = 'translateX(0)'); }
        function quoteMsg(i) { hideAllMenus(); quoting = messages[i]; document.getElementById('quote-preview-bar').classList.remove('hidden'); document.getElementById('quote-preview-text').innerText = cleanBrackets(quoting.content); document.getElementById('message-input').focus(); }
        function cancelQuote() { quoting = null; document.getElementById('quote-preview-bar').classList.add('hidden'); }
        function deleteMsg(i) { messages.splice(i, 1); localStorage.setItem('ai_his', JSON.stringify(messages)); renderHistory(); }
        function renderHistory() { document.getElementById('chat-box').innerHTML = ''; messages.forEach((m, i) => displayMessage(m.role, m.content, i, m.quote)); }
        function toggleMenu() { document.getElementById('plus-menu').classList.toggle('hidden'); document.getElementById('plus-icon').classList.toggle('rotate-45'); }
        function closeMenu() { document.getElementById('plus-menu').classList.add('hidden'); document.getElementById('plus-icon').classList.remove('rotate-45'); }
        function openPersonaPage() { document.getElementById('persona-page').classList.add('active'); }
        function closePersonaPage() { document.getElementById('persona-page').classList.remove('active'); }
        function toggleSettings() { document.getElementById('settings-modal').classList.toggle('active'); }
        function savePersona() { persona.name = document.getElementById('p-name').value; persona.prompt = document.getElementById('p-prompt').value; localStorage.setItem('ai_psn', JSON.stringify(persona)); document.getElementById('display-name').innerText = persona.name; closePersonaPage(); }
        function clearChat() { messages = []; localStorage.removeItem('ai_his'); renderHistory(); }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.remove('opacity-0'); t.style.transform = 'translate(-50%, -10px)'; setTimeout(()=>{t.classList.add('opacity-0'); t.style.transform = 'translate(-50%, 0)';}, 2000); }
        function escapeHTML(s) { return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
    </script>
</body>
</html>
